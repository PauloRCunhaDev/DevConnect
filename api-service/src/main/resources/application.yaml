spring:
  application:
    name: api-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-winter-resonance-act6j7p1-pooler.sa-east-1.aws.neon.tech/neondb}
    username: ${DB_USER:neondb_owner}
    password: ${DB_PASSWORD:npg_bi2WRKXqv4dg&sslmode=require&channelBinding=require}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  error:
    include-stacktrace: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET:devconnect-dev-secret-change-me-32-bytes-minimum}
    expiration-ms: ${JWT_EXPIRATION:900000}
    refresh-expiration-ms: ${REFRESH_EXPIRATION:604800000}
